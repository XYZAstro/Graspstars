<div class="container">
  <h2 class="page-title">Engineering 工程笺</h2>
  <main id="articleList"></main>

  <footer>
    <p>Powered by GitHub Pages | 星海拾遗的北隅 © 2026 XYZAstro</p>
  </footer>
</div>

<script>
// 读取blog/index.json获取文章列表
fetch('../blog/index.json')
  .then(res => res.json())
  .then(indexData => {
    const list = document.getElementById('articleList');
    const articles = indexData.articles.filter(art => art.category === 'eng');
    
    if(articles.length === 0){
      list.innerHTML = "<p style='text-align:center;color:#99b3e0;'>暂无文章</p>";
      return;
    }
    
    articles.forEach(art => {
      const card = document.createElement('div');
      card.className = "blog-card";
      card.innerHTML = `
        <h3 class="card-title">${art.title}</h3>
        <div class="card-date">📅 ${art.date}</div>
        <div class="card-summary">加载中...</div>
        <div class="card-full-content" id="full-${art.id}">加载中...</div>
        <div class="card-category">${art.categoryName}</div>
        <div class="card-expand-btn">
          <span>展开阅读</span>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M19 9l-7 7-7-7" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
      `;
      
      fetch(`../blog/${encodeURIComponent(art.filename)}`)
        .then(res => res.text())
        .then(mdContent => {
          const { content } = parseMarkdown(mdContent);
          const textContent = content.replace(/<[^>]*>/g, '');
          const summary = textContent.length > 20 ? textContent.substring(0, 20) + '...' : textContent;
          card.querySelector('.card-summary').textContent = summary;
          card.querySelector('.card-full-content').innerHTML = content;
        })
        .catch(err => {
          card.querySelector('.card-summary').textContent = '加载失败';
          card.querySelector('.card-full-content').textContent = '无法加载文章内容';
        });
      
      card.addEventListener('click', function() {
        card.classList.toggle('expanded');
        const summary = card.querySelector('.card-summary');
        const fullContent = card.querySelector('.card-full-content');
        summary.classList.toggle('hidden');
        fullContent.classList.toggle('show');
        const expandBtn = card.querySelector('.card-expand-btn span');
        expandBtn.textContent = card.classList.contains('expanded') ? '收起' : '展开阅读';
      });
      
      list.appendChild(card);
    });
  })
  .catch(err => {
    document.getElementById('articleList').innerHTML = "<p style='color:#ff9999;text-align:center;'>加载失败，请检查文件路径</p>";
  });

function parseMarkdown(md) {
  let content = md.replace(/^#\s+.+$/m, '')
              .replace(/\*\*日期：\*\*\s+.+$/m, '')
              .replace(/\*\*分类：\*\*\s+.+$/m, '')
              .trim();
  content = content
    .replace(/^###\s+(.+)$/gm, '<h3>$1</h3>')
    .replace(/^##\s+(.+)$/gm, '<h2>$1</h2>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\n/g, '<br>');
  return { content };
}
</script>
<script>
// 移动端菜单切换

const mobileNavMenu = document.getElementById('mobileNavMenu');
mobileMenuBtn.addEventListener('click', function() {
  mobileMenuBtn.classList.toggle('active');
  mobileNavMenu.classList.toggle('show');
});
</script>
