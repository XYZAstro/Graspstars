</head>
<body>
<div class="star-bg"></div>

<!-- 导航栏（所有页面完全一致） -->
<header class="nav-bar">
  <div class="logo-box">
    <img src="../logo.png" alt="LOGO">
    <span class="logo-text">XYZ Maker</span>
  </div>
  <nav class="nav-menu">
    <a href="../index.html">首页</a>
    <a href="./math.html">Mathematics 数理笺</a>
    <a href="./astro.html">Astro 深空笺</a>
    <a href="./karto.html">Kartogrophy 视觉笺</a>
    <a href="./eng.html" class="active">Engineering 工程笺</a>
    <a href="./life.html">Romantic 生活笺</a>
  </nav>
  <!-- 移动端汉堡菜单按钮 -->
  <div class="mobile-menu-btn" id="mobileMenuBtn">
    <span></span>
    <span></span>
    <span></span>
  </div>
</header>
<!-- 移动端导航菜单 -->
<nav class="mobile-nav-menu" id="mobileNavMenu">
  <a href="../index.html">首页</a>
  <a href="./math.html">Mathematics 数理笺</a>
  <a href="./astro.html">Astro 深空笺</a>
  <a href="./karto.html">Kartogrophy 视觉笺</a>
  <a href="./eng.html" class="active">Engineering 工程笺</a>
  <a href="./life.html">Romantic 生活笺</a>
</nav>

<div class="container">
  <h2 class="page-title">Engineering 工程笺</h2>
  <main id="articleList"></main>

  <footer>
    <p>Powered by GitHub Pages | 星海拾遗的北隅 © 2026 XYZAstro</p>
  </footer>
</div>

<!-- 博客详情模态框 -->
<div class="blog-modal" id="blogModal">
  <div class="modal-content">
    <div class="modal-header">
      <h3 class="modal-title" id="modalTitle"></h3>
      <button class="modal-close" id="modalCloseBtn">×</button>
    </div>
    <div class="modal-body">
      <div class="modal-date" id="modalDate"></div>
      <div class="modal-text" id="modalContent"></div>
      <div class="modal-category" id="modalCategory"></div>
    </div>
  </div>
</div>

<script>
// 读取json中eng分类文章渲染
fetch('../blog.json')
  .then(res => res.json())
  .then(data => {
    const list = document.getElementById('articleList');
    const articles = data.eng;
    if(articles.length === 0){
      list.innerHTML = "<p style='text-align:center;color:#99b3e0;'>暂无文章</p>";
      return;
    }
    articles.forEach(art => {
      const card = document.createElement('div');
      card.className = "blog-card";
      card.style.cursor = "pointer";
      card.setAttribute('data-title', art.title);
      card.setAttribute('data-date', art.date);
      card.setAttribute('data-content', art.content);
      card.setAttribute('data-category', 'Engineering 工程笺');
      card.innerHTML = `
        <h3 class="card-title">${art.title}</h3>
        <div class="card-date">📅 ${art.date}</div>
        <div class="card-content">${art.content}</div>
      `;
      card.addEventListener('click', function() {
        openBlogModal(art.title, art.date, art.content, 'Engineering 工程笺');
      });
      list.appendChild(card);
    })
  })
  .catch(err=>{
    document.getElementById('articleList').innerHTML = "<p style='color:#ff9999;text-align:center;'>加载失败，请检查文件路径</p>";
  })

function openBlogModal(title, date, content, category) {
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalDate').textContent = '📅 ' + date;
  document.getElementById('modalContent').textContent = content;
  document.getElementById('modalCategory').textContent = category;
  document.getElementById('blogModal').classList.add('show');
  document.body.style.overflow = 'hidden';
}

function closeBlogModal() {
  document.getElementById('blogModal').classList.remove('show');
  document.body.style.overflow = '';
}

document.getElementById('modalCloseBtn').addEventListener('click', closeBlogModal);
document.getElementById('blogModal').addEventListener('click', function(e) {
  if(e.target === this) closeBlogModal();
});
document.addEventListener('keydown', function(e) {
  if(e.key === 'Escape' && document.getElementById('blogModal').classList.contains('show')) {
    closeBlogModal();
  }
});
</script>
<script>
// 移动端菜单切换
const mobileMenuBtn = document.getElementById('mobileMenuBtn');
const mobileNavMenu = document.getElementById('mobileNavMenu');
mobileMenuBtn.addEventListener('click', function() {
  mobileMenuBtn.classList.toggle('active');
  mobileNavMenu.classList.toggle('show');
});
</script>
</body>
</html>
