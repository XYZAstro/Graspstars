<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="../style.css">
</head>
<body>
<div class="star-bg"></div>

<!-- 导航栏（所有页面完全一致） -->
<header class="nav-bar">
  <div class="logo-box">
    <img src="../logo.png" alt="LOGO">
    <span class="logo-text">XYZ Maker</span>
  </div>
  <nav class="nav-menu">
    <a href="../index.html">首页</a>
    <a href="./math.html">Mathematics 数理笺</a>
    <a href="./astro.html" class="active">Astro 深空笺</a>
    <a href="./karto.html">Kartogrophy 视觉笺</a>
    <a href="./eng.html">Engineering 工程笺</a>
    <a href="./life.html">Romantic 生活笺</a>
  </nav>
  <!-- 移动端汉堡菜单按钮 -->
  <div class="mobile-menu-btn" id="mobileMenuBtn">
    <span></span>
    <span></span>
    <span></span>
  </div>
</header>
<!-- 移动端导航菜单 -->
<nav class="mobile-nav-menu" id="mobileNavMenu">
  <a href="../index.html">首页</a>
  <a href="./math.html">Mathematics 数理笺</a>
  <a href="./astro.html" class="active">Astro 深空笺</a>
  <a href="./karto.html">Kartogrophy 视觉笺</a>
  <a href="./eng.html">Engineering 工程笺</a>
  <a href="./life.html">Romantic 生活笺</a>
</nav>

<div class="container">
  <h2 class="page-title">Astro 深空笺</h2>
  <main id="articleList"></main>

  <footer>
    <p>Powered by GitHub Pages | 星海拾遗的北隅 © 2026 XYZAstro</p>
  </footer>
</div>

<script>
// 读取json中astro分类文章渲染
fetch('../blog.json')
  .then(res => res.json())
  .then(data => {
    const list = document.getElementById('articleList');
    const articles = data.astro;
    if(articles.length === 0){
      list.innerHTML = "<p style='text-align:center;color:#99b3e0;'>暂无文章</p>";
      return;
    }
    articles.forEach(art => {
      const summary = art.content.length > 20 ? art.content.substring(0, 20) + '...' : art.content;
      const card = document.createElement('div');
      card.className = "blog-card";
      card.innerHTML = `
        <h3 class="card-title">${art.title}</h3>
        <div class="card-date">📅 ${art.date}</div>
        <div class="card-summary">${summary}</div>
        <div class="card-full-content" id="full-${art.id}">${art.content}</div>
        <div class="card-category">Astro 深空笺</div>
        <div class="card-expand-btn">
          <span>展开阅读</span>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M19 9l-7 7-7-7" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
      `;
      card.addEventListener('click', function() {
        card.classList.toggle('expanded');
        const fullContent = card.querySelector('.card-full-content');
        fullContent.classList.toggle('show');
        const expandBtn = card.querySelector('.card-expand-btn span');
        expandBtn.textContent = card.classList.contains('expanded') ? '收起' : '展开阅读';
      });
      list.appendChild(card);
    })
  })
  .catch(err=>{
    document.getElementById('articleList').innerHTML = "<p style='color:#ff9999;text-align:center;'>加载失败，请检查文件路径</p>";
  })
</script>
<script>
// 移动端菜单切换
const mobileMenuBtn = document.getElementById('mobileMenuBtn');
const mobileNavMenu = document.getElementById('mobileNavMenu');
mobileMenuBtn.addEventListener('click', function() {
  mobileMenuBtn.classList.toggle('active');
  mobileNavMenu.classList.toggle('show');
});
</script>
</body>
</html>
